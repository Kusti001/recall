services:
  db:
    image: postgres:latest
    container_name: db_container
    restart: unless-stopped
    env_file:
      - ./db/.env
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_container
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_container
    env_file:
      - ./frontend/.env
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data: